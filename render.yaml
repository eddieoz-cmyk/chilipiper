services:
  - type: web
    name: mql-journey-dashboard
    runtime: node
    buildCommand: echo "no build"
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      - key: CHILIPIPER_DATA_DIR
        value: data/chilipiper
      - key: CHILIPIPER_YEAR
        value: "2026"
      - key: MEETINGS_SOURCE
        value: chilipiper
      - key: ROUTING_SOURCE
        value: chilipiper-file
